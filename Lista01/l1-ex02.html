<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 01 - Execício 02</title>
</head>
<body>

    <h1>Lista 01 - Exercicio 02</h1>
    <h3>Leia um número inteiro positivo e exiba do dobro do número lido.</h3>
    <p>Insira o número:</p>
    <input type="number" name="Número" id="num">
    <input id = 'botao'type="button" value="OK">
    <div id = "res"></div>

    <script>
        var botao = window.document.querySelector('input#botao')
        botao.addEventListener('click', clickar)

        function clickar() {
            var numero = window.document.querySelector('input#num')
            var res = window.document.querySelector('div#res')
            var n = Number(numero.value)
            var dobro = n * 2
            res.innerHTML = `O dobro de ${n} é <strong>${dobro}</strong>.`       
        }
        
    </script>
    
</body>
</html>
