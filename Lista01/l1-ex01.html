<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 01 - Exercício 01</title>
</head>
<body>

    <h1>Lista 01 - Exercicio 01</h1>
    <h3>Escreva um programa que leia seu nome e imprima a mensagem:</h3>
    <p>Insira o seu nome:</p>
    <input type="text" name="Nome" id="nome">
    <input type="button" value="OK">
    <div id = 'res'></div>

    <script>
        var botao = document.querySelector('input[type=button]')
        botao.addEventListener('click', clicar)

        function clicar() {
            var n = window.document.getElementById('nome')
            var res = window.document.querySelector('div#res')
            res.innerHTML = `Seja bem-vindo ao JavaScript, ${n.value}.`
        }
    </script>
    
</body>
</html>
